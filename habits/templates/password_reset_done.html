{% extends 'base.html' %}
{% block title %}Email Sent — HabitFlow{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block background %}
<div class="animated-bg">
    <div class="bg-gradient-layer"></div>
    <div class="particle" style="--x: 30%; --y: 40%; --duration: 7s; --delay: 0s; --size: 4px;"></div>
    <div class="particle" style="--x: 70%; --y: 60%; --duration: 8s; --delay: 1s; --size: 5px;"></div>
    <div class="orb orb-1"></div>
    <div class="mesh-line mesh-2"></div>
</div>
{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="auth-box text-center">
                    <div style="font-size: 2.5rem;">📧</div>
                    <h3 class="mt-3 mb-3">Check Your Email</h3>
                    <p class="text-muted">If an account exists with that email, we've sent a reset link.</p>
                    <a href="{% url 'login' %}" class="btn btn-accent btn-glow px-4 mt-3">Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
