{% extends 'base.html' %}
{% block title %}Reset Done — HabitFlow{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block background %}
<div class="animated-bg">
    <div class="bg-gradient-layer"></div>
    <div class="particle" style="--x: 35%; --y: 30%; --duration: 7s; --delay: 0s; --size: 4px;"></div>
    <div class="particle" style="--x: 55%; --y: 65%; --duration: 8s; --delay: 1s; --size: 5px;"></div>
    <div class="orb orb-2"></div>
    <div class="mesh-line mesh-3"></div>
</div>
{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="auth-box text-center">
                    <div style="font-size: 2.5rem;">🎉</div>
                    <h3 class="mt-3 mb-3">Password Reset Complete</h3>
                    <p class="text-muted">You can now sign in with your new password.</p>
                    <a href="{% url 'login' %}" class="btn btn-accent btn-glow btn-lg px-5 mt-3">Sign In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
